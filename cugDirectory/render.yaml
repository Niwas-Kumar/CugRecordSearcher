# Render.com deployment configuration
# See: https://render.com/docs/render-yaml-reference

services:
  - type: web
    name: cug-directory
    runtime: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/cugDirectory-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DB_URL
        value: postgresql://cug_db_user:LlkmHr1gdirZgFCaE4BtGrm8UngmwS4K@dpg-d98fvjt8nd3s73c9tqs0-a.singapore-postgres.render.com/cug_db
      - key: DB_USERNAME
        value: <neondb_owner>
      - key: DB_PASSWORD
        sync: false   # set this as a secret in the Render dashboard
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false   # set this as a secret in the Render dashboard
      - key: JAVA_TOOL_OPTIONS
        value: "-Xmx512m"
    healthCheckPath: /actuator/health
    autoDeploy: true

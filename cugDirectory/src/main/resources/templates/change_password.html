<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password — CUG Directory</title>
<link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<div class="topbar">
  <div class="brand">CUG Directory</div>
  <nav>
    <span class="who">Signed in as <span id="whoUsername">…</span></span>
    <a th:href="@{/}">Search</a>
    <a class="logout-btn" onclick="logout()">Log out</a>
  </nav>
</div>
<div class="auth-wrap" style="min-height:auto; padding-top:60px;">
  <div class="auth-card">
    <p class="eyebrow">Account Settings</p>
    <h1>Change Your Password</h1>
    <div class="alert-error" id="errorBox" style="display:none;"></div>
    <div class="alert-success" id="successBox" style="display:none;"></div>
    <form id="cpForm">
      <div class="field">
        <label>Current Password</label>
        <input type="password" id="currentPassword" required>
      </div>
      <div class="field">
        <label>New Password</label>
        <input type="password" id="newPassword" required minlength="6">
      </div>
      <div class="field">
        <label>Confirm New Password</label>
        <input type="password" id="confirmPassword" required minlength="6">
      </div>
      <button class="btn-primary" type="submit">Update Password</button>
    </form>
  </div>
</div>

<script th:src="@{/auth-helper.js}"></script>
<script>
(async function init() {
  const me = await requireLogin();
  if (!me) return;
  document.getElementById('whoUsername').textContent = me.username;
})();

document.getElementById('cpForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errorBox = document.getElementById('errorBox');
  const successBox = document.getElementById('successBox');
  errorBox.style.display = 'none';
  successBox.style.display = 'none';

  const currentPassword = document.getElementById('currentPassword').value;
  const newPassword = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  if (newPassword !== confirmPassword) {
    errorBox.textContent = 'New passwords do not match.';
    errorBox.style.display = 'block';
    return;
  }

  const res = await apiFetch('/api/auth/change-password', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ currentPassword, newPassword })
  });
  const data = await res.json();

  if (res.ok) {
    successBox.textContent = 'Password updated successfully.';
    successBox.style.display = 'block';
    document.getElementById('cpForm').reset();
  } else {
    errorBox.textContent = data.error || 'Something went wrong.';
    errorBox.style.display = 'block';
  }
});
</script>
</body>
</html>

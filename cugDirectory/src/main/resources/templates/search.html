<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUG Directory</title>
<link rel="stylesheet" th:href="@{/style.css}">
<style>
  header.hero{ background:var(--navy); color:#fff; padding:22px 20px 56px; position:relative; overflow:hidden; }
  header.hero::after{ content:""; position:absolute; right:-60px; top:-60px; width:220px; height:220px; border-radius:50%; background:radial-gradient(circle at 30% 30%, rgba(200,114,42,0.35), transparent 70%); }
  .hero-inner{ max-width:760px; margin:0 auto; position:relative; z-index:1; }
  .hero-inner h1{ font-size:24px; margin:6px 0 6px; }
  .hero-inner p{ color:#c3d2e4; font-size:14px; margin:0; max-width:520px; }
  .search-wrap{ max-width:760px; margin:-34px auto 0; padding:0 20px; position:relative; z-index:2; }
  .search-box{ background:var(--card); border-radius:14px; box-shadow:0 12px 30px -12px rgba(15,37,68,0.35); display:flex; align-items:center; padding:6px 6px 6px 18px; border:1px solid var(--line); }
  .search-box svg{ flex-shrink:0; color:var(--muted); }
  #search{ flex:1; border:none; outline:none; font-size:16px; padding:15px 10px; font-family:var(--sans); background:transparent; color:var(--ink); }
  #clearBtn{ border:none; background:var(--paper); color:var(--muted); width:32px; height:32px; border-radius:8px; cursor:pointer; display:none; align-items:center; justify-content:center; margin-right:2px; font-size:16px; }
  #clearBtn.show{ display:flex; }
  .meta-row{ max-width:760px; margin:14px auto 0; padding:0 22px; display:flex; justify-content:space-between; font-size:12.5px; color:var(--muted); }
  main.results-main{ max-width:760px; margin:0 auto; padding:18px 20px 80px; }
  #results{ display:flex; flex-direction:column; gap:10px; }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px 18px; cursor:pointer; display:flex; gap:14px; align-items:flex-start; }
  .card:hover{ box-shadow:0 6px 18px -8px rgba(15,37,68,0.18); border-color:#c7d3e0; }
  .avatar{ flex-shrink:0; width:42px; height:42px; border-radius:10px; background:var(--navy); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:15px; }
  .card-body{ flex:1; min-width:0; }
  .card-top{ display:flex; justify-content:space-between; align-items:baseline; gap:10px; flex-wrap:wrap; }
  .card-name{ font-weight:600; font-size:15.5px; }
  .card-name mark, .card-cug mark{ background:var(--amber-soft); color:var(--amber); border-radius:3px; padding:0 1px; }
  .card-cug{ font-family:var(--mono); font-size:14.5px; color:var(--navy); font-weight:600; white-space:nowrap; }
  .card-sub{ color:var(--muted); font-size:13px; margin-top:3px; }
  .empty, .hint{ text-align:center; padding:60px 20px; color:var(--muted); }
  .empty h3{ margin:0 0 6px; color:var(--ink); font-size:16px; }
  .overlay{ position:fixed; inset:0; background:rgba(15,25,45,0.5); display:none; align-items:flex-end; justify-content:center; z-index:50; }
  .overlay.open{ display:flex; }
  @media(min-width:640px){ .overlay{ align-items:center; } }
  .sheet{ background:var(--card); width:100%; max-width:480px; border-radius:18px 18px 0 0; padding:26px 24px 30px; max-height:88vh; overflow-y:auto; }
  @media(min-width:640px){ .sheet{ border-radius:16px; } }
  .sheet-head{ display:flex; align-items:center; gap:14px; margin-bottom:18px; }
  .sheet-avatar{ width:52px; height:52px; border-radius:12px; background:var(--navy); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:18px; flex-shrink:0; }
  .sheet-name{ font-size:18px; font-weight:700; }
  .sheet-desig{ font-size:13px; color:var(--muted); margin-top:2px; }
  .closeBtn{ margin-left:auto; border:none; background:var(--paper); color:var(--muted); width:32px; height:32px; border-radius:8px; cursor:pointer; font-size:16px; }
  .cug-hero{ background:linear-gradient(135deg, var(--navy), #1b3c68); color:#fff; border-radius:12px; padding:16px 18px; display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
  .cug-hero .num{ font-family:var(--mono); font-size:20px; font-weight:600; }
  .cug-hero .label{ font-size:10.5px; text-transform:uppercase; letter-spacing:.1em; color:#a9c1de; margin-bottom:4px; }
  .copyBtn{ background:rgba(255,255,255,0.14); border:1px solid rgba(255,255,255,0.25); color:#fff; padding:8px 12px; border-radius:8px; font-size:12.5px; cursor:pointer; }
  .detail-grid{ display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--line); border:1px solid var(--line); border-radius:10px; overflow:hidden; }
  .detail-item{ background:var(--card); padding:12px 14px; }
  .detail-item .k{ font-size:10.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:4px; }
  .detail-item .v{ font-size:14px; font-weight:600; word-break:break-word; }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">CUG Directory</div>
  <button class="ham-btn" id="hamBtn" aria-label="Menu" aria-expanded="false">
    <span class="bar"></span><span class="bar"></span><span class="bar"></span>
  </button>
  <nav id="mainNav">
    <span class="who">Signed in as <span id="whoUsername">…</span><span id="whoAdminTag"></span></span>
    <a id="adminLink" th:href="@{/admin}" style="display:none;">Admin Panel</a>
    <a th:href="@{/change-password}">Change Password</a>
    <a class="logout-btn" onclick="logout()">Log out</a>
  </nav>
</div>

<header class="hero">
  <div class="hero-inner">
    <p style="font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:#a9c1de; margin:0;">Internal Staff Directory</p>
    <h1>CUG Number Lookup</h1>
    <p>Search by name or CUG number to pull up designation, department, location and entitlement details instantly.</p>
  </div>
</header>

<div class="search-wrap">
  <div class="search-box">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    <input type="text" id="search" placeholder="Enter name or CUG number…" autocomplete="off" autofocus>
    <button id="clearBtn" title="Clear">✕</button>
    <button id="searchBtn">Search</button>
  </div>
</div>

<div class="meta-row">
  <span id="countLabel"></span>
  <span></span>
</div>

<main class="results-main">
  <div id="results"><div class="hint">Enter a <b>name</b> or <b>CUG number</b> and click <b>Search</b> — or press Enter.</div></div>
</main>

<div class="overlay" id="overlay">
  <div class="sheet" id="sheet"></div>
</div>

<script th:src="@{/auth-helper.js}"></script>
<script>
const resultsEl  = document.getElementById('results');
const searchEl   = document.getElementById('search');
const clearBtn   = document.getElementById('clearBtn');
const searchBtn  = document.getElementById('searchBtn');
const countLabel = document.getElementById('countLabel');
const overlay    = document.getElementById('overlay');
const sheet      = document.getElementById('sheet');
let currentResults = [];

(async function init() {
  const me = await requireLogin();
  if (!me) return;
  document.getElementById('whoUsername').textContent = me.username;
  if (me.role === 'ADMIN') {
    document.getElementById('whoAdminTag').textContent = ' · Admin';
    document.getElementById('adminLink').style.display = 'inline';
  }
})();

function initials(name){
  const parts = (name || '').trim().split(/\s+/).filter(Boolean);
  if(parts.length === 0) return '?';
  if(parts.length === 1) return parts[0].slice(0,2).toUpperCase();
  return (parts[0][0] + parts[1][0]).toUpperCase();
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function highlight(text, query){
  const escaped = escapeHtml(text);
  if(!query) return escaped;
  const q = escapeHtml(query).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escaped.replace(new RegExp('(' + q + ')', 'ig'), '<mark>$1</mark>');
}

async function doSearch(q){
  if(!q){
    resultsEl.innerHTML = '<div class="hint">Start typing a <b>name</b> or <b>CUG number</b> above to find a record.</div>';
    countLabel.textContent = '';
    return;
  }
  try {
    const res = await apiFetch('/api/cug/search?q=' + encodeURIComponent(q));
    if (res.status === 401) { window.location.href = '/login'; return; }
    const data = await res.json();
    currentResults = data;
    countLabel.textContent = data.length + ' match' + (data.length === 1 ? '' : 'es');

    if(data.length === 0){
      resultsEl.innerHTML = `<div class="empty"><h3>No matching record</h3><p>Check the spelling of the name, or the CUG number, and try again.</p></div>`;
      return;
    }

    resultsEl.innerHTML = data.map((r, i) => `
      <div class="card" data-idx="${i}">
        <div class="avatar">${initials(r.name)}</div>
        <div class="card-body">
          <div class="card-top">
            <span class="card-name">${highlight(r.name, q)}</span>
            <span class="card-cug">${highlight(r.cugNumber, q)}</span>
          </div>
          <div class="card-sub">${[r.designation, r.department, r.location].filter(Boolean).join(' · ') || '—'}</div>
        </div>
      </div>`).join('');
  } catch(err) {
    resultsEl.innerHTML = '<div class="empty"><h3>Connection error</h3><p>Could not reach the server. Please check your connection and try again.</p></div>';
    countLabel.textContent = '';
  }
}

function openDetail(rec){
  const rows = [
    ['Employee Code', rec.empCode || '—'],
    ['Designation', rec.designation || '—'],
    ['Department', rec.department || '—'],
    ['Grade', rec.grade || '—'],
    ['Location', rec.location || '—'],
    ['Office / Unit', rec.office || '—'],
    ['Entitlement (₹)', rec.entitlement ?? '—'],
    ['Roaming Charge', rec.roamingCharge ?? '—'],
    ['Status', rec.status || '—'],
  ];
  sheet.innerHTML = `
    <div class="sheet-head">
      <div class="sheet-avatar">${initials(rec.name)}</div>
      <div>
        <div class="sheet-name">${escapeHtml(rec.name)}</div>
        <div class="sheet-desig">${escapeHtml(rec.designation || 'Designation not listed')}</div>
      </div>
      <button class="closeBtn" id="closeBtn">✕</button>
    </div>
    <div class="cug-hero">
      <div><div class="label">CUG Number</div><div class="num">${rec.cugNumber}</div></div>
      <button class="copyBtn" id="copyBtn">Copy</button>
    </div>
    <div class="detail-grid">
      ${rows.map(([k,v]) => `<div class="detail-item"><div class="k">${k}</div><div class="v">${escapeHtml(String(v))}</div></div>`).join('')}
    </div>`;
  overlay.classList.add('open');
  document.getElementById('closeBtn').addEventListener('click', closeDetail);
  document.getElementById('copyBtn').addEventListener('click', () => {
    navigator.clipboard.writeText(rec.cugNumber).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = 'Copied ✓';
      setTimeout(() => btn.textContent = 'Copy', 1300);
    });
  });

  apiFetch('/api/cug/view', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({cugNumber: rec.cugNumber, name: rec.name})
  });
}
function closeDetail(){ overlay.classList.remove('open'); }

overlay.addEventListener('click', (e) => { if(e.target === overlay) closeDetail(); });
document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeDetail(); });
resultsEl.addEventListener('click', (e) => {
  const card = e.target.closest('.card');
  if(!card) return;
  openDetail(currentResults[parseInt(card.dataset.idx, 10)]);
});

// ── Execute a deliberate search ─────────────────────────────────────────────
// Data is only shown after an explicit Search button click or Enter key press.
// Every execution is logged (it's an intentional action, not a keystroke).
function executeSearch() {
  const q = searchEl.value.trim();
  doSearch(q);
  if (q) {
    apiFetch('/api/cug/log-search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: q })
    });
  }
}

searchEl.addEventListener('keydown', e => {
  if (e.key === 'Enter') executeSearch();
});

searchBtn.addEventListener('click', executeSearch);

clearBtn.addEventListener('click', () => {
  searchEl.value = '';
  searchEl.focus();
  clearBtn.classList.remove('show');
  countLabel.textContent = '';
  resultsEl.innerHTML = '<div class="hint">Enter a <b>name</b> or <b>CUG number</b> and click <b>Search</b> — or press Enter.</div>';
});

searchEl.addEventListener('input', e => {
  clearBtn.classList.toggle('show', e.target.value.length > 0);
});

// ── Hamburger menu ───────────────────────────────────────────────────────────
document.getElementById('hamBtn').addEventListener('click', function() {
  this.classList.toggle('open');
  document.getElementById('mainNav').classList.toggle('nav-open');
  this.setAttribute('aria-expanded', this.classList.contains('open'));
});
document.querySelectorAll('#mainNav a').forEach(a => {
  a.addEventListener('click', () => {
    document.getElementById('hamBtn').classList.remove('open');
    document.getElementById('mainNav').classList.remove('nav-open');
  });
});

</script>
</body>
</html>

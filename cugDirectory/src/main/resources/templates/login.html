<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — CUG Directory</title>
<link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <p class="eyebrow">Restricted Access</p>
    <h1>Sign in to CUG Directory</h1>
    <div class="alert-error" id="errorBox" style="display:none;"></div>
    <form id="loginForm" autocomplete="on">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autofocus autocomplete="username">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>
      <button class="btn-primary" type="submit" id="submitBtn">Sign In</button>
    </form>
  </div>
</div>

<script th:src="@{/auth-helper.js}"></script>
<script>
// If already logged in, go straight to the search page.
apiFetch('/api/auth/me').then(res => {
  if (res.ok) window.location.href = '/';
});

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const errorBox  = document.getElementById('errorBox');
  const submitBtn = document.getElementById('submitBtn');
  const username  = document.getElementById('username').value.trim();
  const password  = document.getElementById('password').value;

  errorBox.style.display = 'none';
  submitBtn.disabled = true;
  submitBtn.textContent = 'Signing in…';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });

    if (res.ok) {
      window.location.href = '/';
      return;
    }

    const data = await res.json().catch(() => ({}));
    errorBox.textContent = data.error || 'Login failed. Please try again.';
    errorBox.style.display = 'block';

  } catch (err) {
    errorBox.textContent = 'Could not reach the server. Please check your connection.';
    errorBox.style.display = 'block';
  }

  submitBtn.disabled = false;
  submitBtn.textContent = 'Sign In';
});
</script>
</body>
</html>

# ════════════════════════════════════════════════════════════════════════
#  application.properties  —  SHARED / BASE CONFIG
#  Profile-specific overrides live in:
#    application-dev.properties   (local development)
#    application-prod.properties  (production deployment)
#
#  Active profile is selected by the SPRING_PROFILES_ACTIVE env var.
#  Defaults to 'dev' if not set, so local runs just work out of the box.
# ════════════════════════════════════════════════════════════════════════

spring.application.name=cugDirectory

# ── Active profile ──────────────────────────────────────────────────────
# Set SPRING_PROFILES_ACTIVE=prod on your server / hosting platform
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ── Multipart file upload (admin Excel import) ──────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ── Error handling ──────────────────────────────────────────────────────
server.error.whitelabel.enabled=false

# ── Actuator (health check for hosting platforms) ───────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ── JPA base ────────────────────────────────────────────────────────────
spring.jpa.open-in-view=false

spring.application.name=cugDirectory

# ── Database ──────────────────────────────────────────────────────────────
# Override via environment variables in production (e.g. Render, Railway, etc.)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/cug_directory?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Force@#753}

# ── JPA / Hibernate ───────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ── Server ────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# Multipart file upload (admin Excel import)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

server.error.whitelabel.enabled=false

# ── Actuator ─────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ── Admin seed credentials (override via env vars in production) ──────────
admin.default-username=${ADMIN_USERNAME:admin}
admin.default-password=${ADMIN_PASSWORD:changeme123}

# ════════════════════════════════════════════════════════════════════════
#  application-prod.properties  —  PRODUCTION
#  Activated when: SPRING_PROFILES_ACTIVE=prod
#
#  IMPORTANT: No hardcoded secrets here. Every sensitive value MUST come
#  from environment variables set on your hosting platform
#  (Render, Railway, AWS, etc.).
#  See .env.prod for the full list of required variables.
# ════════════════════════════════════════════════════════════════════════

# ── Server ──────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Database (read entirely from env vars — NO FALLBACK) ─────────────────
# These MUST be set on the hosting platform. App will fail to start if missing.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool tuning for production
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ──────────────────────────────────────────────────────
# 'update' keeps schema in sync without dropping data.
# Switch to 'validate' once schema is stable for extra safety.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Never print SQL in production logs (performance + security)
spring.jpa.show-sql=false

# ── Logging ──────────────────────────────────────────────────────────────
# Only WARN and above in production — avoids log flooding
logging.level.root=WARN
logging.level.com.irctc.cugDirectory=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%-5level] %logger{30} - %msg%n

# ── Session security ─────────────────────────────────────────────────────
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict
# Enable 'secure' flag only if your hosting platform provides HTTPS (recommended)
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:true}

# ── Admin seed credentials (MUST be overridden via env vars in prod!) ────
admin.default-username=${ADMIN_USERNAME}
admin.default-password=${ADMIN_PASSWORD}

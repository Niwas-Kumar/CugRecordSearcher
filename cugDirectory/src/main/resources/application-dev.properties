# ════════════════════════════════════════════════════════════════════════
#  application-dev.properties  —  LOCAL DEVELOPMENT
#  Activated when: SPRING_PROFILES_ACTIVE=dev  (default if not set)
#
#  Safe to commit — contains only local dev values, not real secrets.
#  To override any value without editing this file, set the corresponding
#  environment variable in your shell or a local .env.dev file.
# ════════════════════════════════════════════════════════════════════════

# ── Server ──────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Database (local MySQL) ───────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/cug_directory?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Force@#753}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────────────
# 'update' — auto-creates / updates tables on startup (safe for dev)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Show SQL in console for debugging (dev only!)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Logging ──────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.irctc.cugDirectory=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{HH:mm:ss} [%-5level] %logger{36} - %msg%n

# ── Session ──────────────────────────────────────────────────────────────
server.servlet.session.timeout=60m

# ── Admin seed credentials (dev defaults) ───────────────────────────────
admin.default-username=${ADMIN_USERNAME:admin}
admin.default-password=${ADMIN_PASSWORD:changeme123}

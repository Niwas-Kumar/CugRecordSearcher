# ════════════════════════════════════════════════════════════════════════
#  application-dev.properties  —  LOCAL DEVELOPMENT
#  Activated when: SPRING_PROFILES_ACTIVE=dev  (default if not set)
# ════════════════════════════════════════════════════════════════════════

# ── Server ──────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Database (local PostgreSQL) ──────────────────────────────────────────
# Default: connects to local PostgreSQL on port 5432
# Install PostgreSQL locally: https://www.postgresql.org/download/
# Then create DB: CREATE DATABASE cug_directory;
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/cug_directory}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Show SQL in console for debugging (dev only!)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Logging ──────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.irctc.cugDirectory=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{HH:mm:ss} [%-5level] %logger{36} - %msg%n

# ── Session ──────────────────────────────────────────────────────────────
server.servlet.session.timeout=60m

# ── Admin seed credentials (dev defaults) ───────────────────────────────
admin.default-username=${ADMIN_USERNAME:admin}
admin.default-password=${ADMIN_PASSWORD:changeme123}

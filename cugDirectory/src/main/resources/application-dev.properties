# ════════════════════════════════════════════════════════════════════════
#  application-dev.properties  —  LOCAL DEVELOPMENT
#  Activated when: SPRING_PROFILES_ACTIVE=dev  (default if not set)
#
#  Uses local MySQL — your existing data is already here.
#  Production (Render) uses PostgreSQL via application-prod.properties.
# ════════════════════════════════════════════════════════════════════════

# ── Server ──────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Database (local MySQL — already has your data) ───────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/cug_directory?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Force@#753}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Show SQL in console for debugging (dev only)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Logging ──────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.irctc.cugDirectory=DEBUG
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss} [%-5level] %logger{36} - %msg%n

# ── Session ──────────────────────────────────────────────────────────────
server.servlet.session.timeout=60m

# ── Admin seed credentials ───────────────────────────────────────────────
admin.default-username=${ADMIN_USERNAME:admin}
admin.default-password=${ADMIN_PASSWORD:changeme123}

# Render.com deployment configuration
# See: https://render.com/docs/render-yaml-reference

services:
  - type: web
    name: cug-directory
    runtime: docker
    dockerfilePath: ./Dockerfile
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/cugDirectory-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DB_URL
        value: postgresql://neondb_owner:npg_5Kw3JahkDFLu@ep-jolly-salad-aomnwz22-pooler.c-2.ap-southeast-1.aws.neon.tech/CUG-DB?sslmode=require&channel_binding=require
      - key: DB_USERNAME
        value: <neondb_owner>
      - key: DB_PASSWORD
        sync: false   # set this as a secret in the Render dashboard
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false   # set this as a secret in the Render dashboard
      - key: JAVA_TOOL_OPTIONS
        value: "-Xmx512m"
    healthCheckPath: /actuator/health
    autoDeploy: true

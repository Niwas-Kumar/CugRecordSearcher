# render.yaml — Render deployment blueprint
# Docs: https://render.com/docs/blueprint-spec
#
# ⚠  NEVER put real credentials here.
#    All secrets are set in the Render Dashboard under:
#    Service → Environment → "Add Environment Variable"

services:
  - type: web
    name: cug-directory
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free

    # All sensitive values come from Render's secret environment variables.
    # Set these in the Render Dashboard — NOT here.
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod

      - key: PORT
        value: 10000

      # ── Database (set these as secrets in Render Dashboard) ──────────────
      # DB_URL        → jdbc:postgresql://<host>:5432/cug_directory
      # DB_USERNAME   → your PostgreSQL username
      # DB_PASSWORD   → your PostgreSQL password (mark as Secret)
      - key: DB_URL
        sync: false          # Render will prompt you to fill this in the dashboard

      - key: DB_USERNAME
        sync: false

      - key: DB_PASSWORD
        sync: false

      # ── Admin credentials (set as secrets in Render Dashboard) ──────────
      # ADMIN_USERNAME  → admin panel login username
      # ADMIN_PASSWORD  → use a strong password (mark as Secret)
      - key: ADMIN_USERNAME
        sync: false

      - key: ADMIN_PASSWORD
        sync: false

    healthCheckPath: /api/ping
